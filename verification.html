<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation d'email | Komondi</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { color: #0d47a1; margin-bottom: 15px; }
        p { color: #2c3e50; line-height: 1.6; margin-bottom: 25px; }
        button {
            background: #1e88e5;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #0d47a1; }
        .error {
            color: #d32f2f;
            background: #ffebee;
            padding: 10px;
            border-radius: 12px;
            margin-top: 15px;
            display: none;
        }
        .loading { display: none; margin-top: 20px; color: #666; }
    </style>
    
    <!-- ✅ Firebase SDK (آمن - لا يحتوي على مفاتيح) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
</head>
<body>
    <div class="card">
        <div class="icon">✉️</div>
        <h1>تأكيد البريد الإلكتروني</h1>
        <div id="statusMessage">
            <p>جاري التحقق من بريدك الإلكتروني...</p>
        </div>
        <div id="successMessage" style="display:none;">
            <p>✅ <strong>تم تأكيد بريدك الإلكتروني بنجاح!</strong></p>
            <p>يمكنك الآن إغلاق هذه الصفحة وتسجيل الدخول إلى تطبيق Komondi.</p>
            <button onclick="openApp()">فتح التطبيق</button>
        </div>
        <div id="errorMessage" style="display:none;" class="error">
            <p>❌ <strong>حدث خطأ أثناء التحقق.</strong></p>
            <p>قد يكون الرابط غير صالح أو منتهي الصلاحية.</p>
            <button onclick="openApp()" style="background:#ff9800; margin-top:10px;">فتح التطبيق</button>
        </div>
        <div class="loading" id="loadingIndicator">جاري التحقق...</div>
    </div>

    <script>
        // ✅ تكوين Firebase (آمن - هذه معلومات عامة وليست مفاتيح سرية)
    
        
        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function openApp() {
            window.location.href = "komondiapp://verification-success";
            setTimeout(() => {
                window.location.href = "https://play.google.com/store/apps/details?id=com.dzstartup.komondi";
            }, 500);
        }

        async function handleEmailVerification() {
            const mode = getQueryParam('mode');
            const oobCode = getQueryParam('oobCode');
            
            document.getElementById('loadingIndicator').style.display = 'block';

            if (mode !== 'verifyEmail' || !oobCode) {
                document.getElementById('statusMessage').style.display = 'none';
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('loadingIndicator').style.display = 'none';
                return;
            }

            try {
                // ✅ استخدام SDK الآمن بدلاً من REST API
                await auth.applyActionCode(oobCode);
                
                // نجاح التحقق
                document.getElementById('loadingIndicator').style.display = 'none';
                document.getElementById('statusMessage').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                
            } catch (error) {
                console.error("Verification error:", error);
                document.getElementById('loadingIndicator').style.display = 'none';
                document.getElementById('statusMessage').style.display = 'none';
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        window.onload = handleEmailVerification;
    </script>
</body>
</html>
